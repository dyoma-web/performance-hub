<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Performance Hub</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary":          "#16B79C",
                        "highlight":        "#E36B5B",
                        "accent":           "#E9C456",
                        "gold":             "#E9C456",
                        "background-light": "#f8f9fa",
                        "background-dark":  "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Manrope", "system-ui", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.25rem",
                        lg:     "0.5rem",
                        xl:     "0.85rem",
                        "2xl":  "1.25rem",
                        "3xl":  "1.5rem",
                        full:   "9999px",
                    },
                },
            },
        };
    </script>

    <style type="text/tailwindcss">
        :root {
            --primary:   #16B79C;
            --highlight: #E36B5B;
            --accent:    #E9C456;
        }
        body {
            font-family: 'Manrope', system-ui, sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        /* Scrollbar */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        /* Smooth transitions */
        * { scroll-behavior: smooth; }
        /* Animated entry */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        #app-content > * {
            animation: fadeInUp 0.3s ease-out;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-800 dark:text-slate-100 font-display transition-colors duration-300">

    <!-- Tailwind safelist: hidden div to ensure dynamic classes are generated -->
    <div class="hidden">
        <span class="bg-primary text-primary border-primary shadow-primary/20 bg-primary/5 bg-primary/10 bg-primary/20 ring-primary/30 border-primary/10 border-primary/20"></span>
        <span class="bg-highlight text-highlight border-highlight shadow-highlight/20 bg-highlight/5 bg-highlight/10 bg-highlight/20 ring-highlight/30 border-highlight/10 border-highlight/20"></span>
        <span class="bg-accent text-accent border-accent shadow-accent/20 bg-accent/5 bg-accent/10 bg-accent/20 ring-accent/30 border-accent/10 border-accent/20"></span>
        <span class="bg-gold text-gold border-gold bg-gold/10 bg-gold/20"></span>
        <span class="bg-slate-400 text-slate-400 bg-slate-400/10 bg-slate-500 text-slate-500 bg-slate-500/10"></span>
        <span class="bg-indigo-500 bg-pink-500 bg-teal-500"></span>
        <span class="from-primary/5 to-primary/0 from-highlight/5 to-highlight/0 from-accent/5 to-accent/0"></span>
        <span class="border-2 border-primary ring-2 ring-primary/30"></span>
        <span class="from-primary/[0.04] from-primary/[0.03]"></span>
    </div>

    <!-- App root -->
    <div id="app">
        <!-- Loading state -->
        <div class="flex items-center justify-center h-screen">
            <div class="text-center">
                <div class="w-16 h-16 bg-primary rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-primary/20 animate-pulse">
                    <span class="material-symbols-outlined text-white text-3xl">insights</span>
                </div>
                <p class="text-slate-400 font-semibold text-sm">Cargando Performance Hub...</p>
            </div>
        </div>
    </div>

    <!-- Main module -->
    <script type="module">
        import { registerView, init } from './js/app.js';
        import { render as dashboard }          from './js/views/dashboard.js';
        import { render as selfReview }         from './js/views/self-review.js';
        import { render as checkin }            from './js/views/checkin.js';
        import { render as peerFeedback }       from './js/views/peer-feedback.js';
        import { render as facilitatorReview }  from './js/views/facilitator-review.js';
        import { render as adminCycles }        from './js/views/admin.js';
        import { render as calibration }        from './js/views/calibration.js';
        import { render as meeting }            from './js/views/meeting.js';
        import { render as development }        from './js/views/development.js';

        // Register all views
        registerView('dashboard',           dashboard);
        registerView('self-review',         selfReview);
        registerView('objectives',          dashboard);          // reutiliza dashboard (scroll to objectives)
        registerView('checkin',             checkin);
        registerView('peer-feedback',       peerFeedback);
        registerView('facilitator-review',  facilitatorReview);
        registerView('team-reviews',        dashboard);          // facilitator dashboard shows team
        registerView('meeting',             meeting);
        registerView('development',         development);
        registerView('admin-cycles',        adminCycles);
        registerView('admin-calibration',   calibration);
        registerView('admin-reports',       adminCycles);        // placeholder - same admin view
        registerView('admin-directory',     adminCycles);        // placeholder - same admin view

        // Boot
        init();
    </script>
</body>
</html>
